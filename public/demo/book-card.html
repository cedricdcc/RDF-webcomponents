<div class="book-list">
  {{#each items}}
  <article class="book-card">
    <h3>{{title}}</h3>
    {{#author}}<p class="author">by {{author}}</p>{{/author}}
    <div class="meta">
      {{#year}}<span class="tag">📅 {{year}}</span>{{/year}}
      {{#genre}}<span class="tag">📚 {{genre}}</span>{{/genre}}
      {{#isbn}}<span class="tag isbn">ISBN: {{isbn}}</span>{{/isbn}}
    </div>
  </article>
  {{/each}}
</div>

<style>
  .book-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.75rem;
  }

  .book-card {
    border: 1px solid #c7d2fe;
    border-radius: 0.75rem;
    padding: 0.875rem;
    background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
  }

  .book-card h3 {
    margin: 0 0 0.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: #1e1b4b;
  }

  .book-card .author {
    margin: 0 0 0.5rem;
    font-size: 0.8rem;
    color: #6366f1;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }

  .tag {
    font-size: 0.7rem;
    padding: 0.2rem 0.45rem;
    border-radius: 9999px;
    background: #e0e7ff;
    color: #3730a3;
    white-space: nowrap;
  }

  .isbn {
    background: #f0fdf4;
    color: #166534;
  }
</style>
